<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl">
        <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl shadow-2xl p-8 md:p-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 mb-4 shadow-lg shadow-orange-500/20">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1 class="text-5xl md:text-6xl font-black tracking-tight bg-gradient-to-r from-cyan-400 via-blue-400 to-violet-400 bg-clip-text text-transparent">
                    Firebase Test
                </h1>
                <p class="text-slate-400 mt-3">Firestore pripojenie • pokedex-8f4b3</p>
            </div>

            <button id="testBtn" class="group relative w-full py-4 px-6 bg-white text-slate-950 font-semibold rounded-2xl overflow-hidden transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
                <span class="relative z-10 flex items-center justify-center gap-2">
                    <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                    <span id="btnText">Test pripojenia</span>
                </span>
                <div class="absolute inset-0 bg-gradient-to-r from-cyan-400 to-blue-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
            </button>

            <div class="mt-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs uppercase tracking-wider text-slate-500 font-medium">Výstup</span>
                    <span id="status" class="text-xs px-2 py-1 rounded-full bg-slate-800 text-slate-400">Pripravený</span>
                </div>
                <div id="output" class="min-h-[180px] max-h-[320px] overflow-y-auto bg-black/60 rounded-2xl p-4 border border-slate-800 font-mono text-[13px] leading-relaxed space-y-1.5">
                    <div class="text-slate-500">Kliknite na tlačidlo pre test...</div>
                </div>
            </div>

            <div class="mt-6 pt-6 border-t border-slate-800 flex items-center justify-between text-xs text-slate-500">
                <span>Collection: <code class="text-cyan-400">test</code> / Doc: <code class="text-cyan-400">ping</code></span>
                <span>Firebase v10.12.2</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDmCw5u5s7oWK3cQ0pib5yKWw1aK0FQ7a8",
            authDomain: "pokedex-8f4b3.firebaseapp.com",
            projectId: "pokedex-8f4b3",
            storageBucket: "pokedex-8f4b3.firebasestorage.app",
            messagingSenderId: "287433097466",
            appId: "1:287433097466:web:b6e104fa1e0a61e0e1f5cd"
        };

        const testBtn = document.getElementById('testBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let app = null;
        let db = null;
        let initialized = false;

        function addLog(text, className = 'text-slate-300') {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            output.innerHTML = '';
        }

        function setStatus(text, color) {
            status.textContent = text;
            status.className = `text-xs px-2 py-1 rounded-full ${color}`;
        }

        testBtn.addEventListener('click', async () => {
            testBtn.disabled = true;
            btnText.textContent = 'Testujem...';
            btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>';
            btnIcon.classList.add('animate-spin');
            clearOutput();
            setStatus('Pripojovanie...', 'bg-amber-500/20 text-amber-400');

            try {
                // Initialize
                if (!initialized) {
                    addLog('> Inicializujem Firebase...', 'text-slate-500');
                    app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    initialized = true;
                    addLog('✓ Firebase app inicializovaná', 'text-green-400');
                    addLog(`✓ Project: ${firebaseConfig.projectId}`, 'text-green-400');
                } else {
                    addLog('> Používam existujúcu inštanciu', 'text-slate-500');
                }

                // Write test
                addLog('', '');
                addLog('> Zapisujem do Firestore...', 'text-slate-500');
                const testRef = doc(db, 'test', 'ping');
                const payload = {
                    timestamp: new Date().toISOString(),
                    test: true,
                    message: 'ping from web',
                    random: Math.floor(Math.random() * 10000),
                    userAgent: navigator.userAgent.substring(0, 50)
                };

                await setDoc(testRef, payload);
                addLog('✓ Zápis úspešný do test/ping', 'text-green-400');

                // Read test
                addLog('', '');
                addLog('> Čítam dokument späť...', 'text-slate-500');
                const snap = await getDoc(testRef);

                if (!snap.exists()) {
                    throw new Error('Dokument neexistuje po zápise');
                }

                addLog('✓ Čítanie úspešné', 'text-green-400');
                
                const data = snap.data();
                addLog('', '');
                addLog('─ Dokument dáta ─', 'text-cyan-400');
                
                const pre = document.createElement('pre');
                pre.className = 'text-cyan-300 bg-slate-900/50 p-3 rounded-lg mt-1 overflow-x-auto';
                pre.textContent = JSON.stringify(data, null, 2);
                output.appendChild(pre);

                addLog('', '');
                addLog('✅ PRIPOJENIE FUNGUJE', 'text-emerald-400 font-bold text-[14px]');
                setStatus('Úspech', 'bg-green-500/20 text-green-400');

            } catch (error) {
                console.error('Firebase error:', error);
                addLog('', '');
                addLog('✗ CHYBA PRIPOJENIA', 'text-red-500 font-bold');
                addLog(`> ${error.code || 'Error'}`, 'text-red-400');
                addLog(`> ${error.message}`, 'text-red-300');
                
                if (error.code === 'permission-denied') {
                    addLog('', '');
                    addLog('TIP: Skontrolujte Firestore Rules', 'text-amber-400');
                }
                
                setStatus('Chyba', 'bg-red-500/20 text-red-400');
            } finally {
                testBtn.disabled = false;
                btnText.textContent = 'Test pripojenia';
                btnIcon.classList.remove('animate-spin');
                btnIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>';
            }
        });

        // Auto-focus
        testBtn.focus();
    </script>
</body>
</html>
