    <script>
        // --- KONŠTANTY A STAV ---
        const APP_VERSION = "8.60";
        const GEN_TOTALS = { 1: 151, 2: 100, 3: 135, 4: 107, 5: 156, 6: 72, 7: 88, 8: 96, 9: 120 };
        const GEN_NAMES = { 1: 'Kanto', 2: 'Johto', 3: 'Hoenn', 4: 'Sinnoh', 5: 'Unova', 6: 'Kalos', 7: 'Alola', 8: 'Galar', 9: 'Paldea' };

        let POKEMON_DATA = [], WORDS_DATABASE = [], currentUserName = null, unlockedIds = [];
        let currentTask = null, activeScreen = 'login', selectedGen = null, lastWordUsed = null;
        let languageSettings = {}, playedAudio = {}, allProfiles = [], editingProfileName = null, isLoading = false;

        const DEFAULT_PARENTAL = { 
            pin: "0000", dailyLimit: 50, skEnLock: true, showNotice: false,
            noticeText: "⚠️ Testovacia verzia - funkcie môžu byť obmedzené",
            darkMode: false, autoDarkMode: true, autoDarkStart: 19, autoDarkEnd: 7
        };
// --- KONTROLA VERZIE (už nemažeme nastavenia) ---

const IS_UPDATE = STORED_VERSION && STORED_VERSION !== APP_VERSION;
if (IS_UPDATE || !STORED_VERSION) {
    localStorage.setItem('poke_app_version', APP_VERSION);
}
if (IS_UPDATE) {
    window.addEventListener('DOMContentLoaded', () => {
        const upd = document.createElement('div');
        upd.id = 'update-notice';
        upd.style.cssText = 'position:fixed;inset:0;background:rgba(30,58,138,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;color:white;';

        const loadGlobalParental = () => {
            try {
                const saved = localStorage.getItem('poke_global_parental');
                return saved ? { ...DEFAULT_PARENTAL, ...JSON.parse(saved) } : { ...DEFAULT_PARENTAL };
            } catch(e) { return { ...DEFAULT_PARENTAL }; }
        };
        const saveGlobalParental = (data) => {
            try { localStorage.setItem('poke_global_parental', JSON.stringify(data)); } catch(e){}
        };

        let globalParental = loadGlobalParental();
        // --- SYNC INDIKÁTOR ---
        window.addEventListener('DOMContentLoaded', () => {
            const ind = document.createElement('div');
            ind.id = 'sync-indicator';
            ind.style.cssText = 'position:fixed;bottom:8px;right:8px;background:rgba(0,0,0,0.65);color:#fff;padding:5px 10px;border-radius:14px;font-size:11px;font-family:Plus Jakarta Sans,sans-serif;z-index:9999;pointer-events:none;transition:all 0.3s;';
            ind.innerHTML = '☁️ lokálne';
            document.body.appendChild(ind);
            window.updateSyncStatus = (state) => {
                if(state==='saving'){ ind.innerHTML='☁️ ukladám...'; ind.style.background='rgba(37,99,235,0.85)'; }
                else if(state==='synced'){ ind.innerHTML='✓ synchronizované'; ind.style.background='rgba(22,163,74,0.85)'; setTimeout(()=>{ ind.innerHTML='☁️'; ind.style.background='rgba(0,0,0,0.65)'; }, 2000); }
                else if(state==='error'){ ind.innerHTML='⚠ chyba'; ind.style.background='rgba(220,38,38,0.85)'; }
                else { ind.innerHTML='☁️ lokálne'; ind.style.background='rgba(0,0,0,0.65)'; }
            };
        });

        let parental = { ...globalParental };

        let stats = { unlockedToday: 0, lastDate: new Date().toLocaleDateString(), completedWords: [], taskCounter: 0, errorsToday: 0, mathAQueue: [], mathBQueue: [] };
        const PRAISE_WORDS = ["výborne", "perfektne", "vynikajúco", "skvele", "bezchybne"];

        const getPokemonData = () => {
            const data = window.POKEDEX_DATA || {};
            const EN = window.EN_POKEDEX || {};
            const SK = window.SK_POKEDEX || {};
            const getGenById = (id) => { let cum=0; for(let g=1; g<=9; g++){ cum+=GEN_TOTALS[g]; if(id<=cum) return g } return 9 };
            // popisy už sú v gen súboroch
            return Object.values(data).map(p => ({
                ...p,
                numericId: Number(p.id),
                gen: p.gen || getGenById(Number(p.id)),
                descEn: EN[p.id] || p.descEn || "No English description.",
                descSk: SK[p.id] || p.descSk || "Slovenský popis čoskoro pribudne.",
                displayHeight: p.height ? (p.height / 10).toFixed(1) : "?",
                displayWeight: p.weight ? (p.weight / 10).toFixed(1) : "?",
                displayTypes: p.typesSk || (Array.isArray(p.types) ? p.types.join(' / ') : 'Neznámy')
            })).sort((a, b) => a.numericId - b.numericId);
        };

        const isMessenger = () => {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("Messenger") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
        };

        const applyVisualTheme = () => {
            const hour = new Date().getHours();
            let isDark = parental.darkMode;
            if (parental.autoDarkMode) {
                if (parental.autoDarkStart > parental.autoDarkEnd) {
                    isDark = (hour >= parental.autoDarkStart || hour < parental.autoDarkEnd);
                } else {
                    isDark = (hour >= parental.autoDarkStart && hour < parental.autoDarkEnd);
                }
            }
            document.documentElement.classList.toggle('dark', isDark);
        };

        const speak = (text, lang = 'sk-SK', onEndCallback = null) => {
            if (!window.speechSynthesis) { if (onEndCallback) onEndCallback(); return; }
            try {
                // odstránené cancel, aby sa neprekrývali hlášky a fungoval callback
                const ut = new SpeechSynthesisUtterance(text || " ");
                const voices = window.speechSynthesis.getVoices();
                const bestVoice = voices.find(v => v.lang.startsWith(lang.split('-')[0])) || voices.find(v => v.lang.includes(lang.split('-')[0]));
                if (bestVoice) ut.voice = bestVoice;
                ut.lang = lang;
                ut.rate = (lang === 'en-US') ? 0.8 : 1.0;
                ut.onend = () => { if (onEndCallback) onEndCallback(); };
                window.speechSynthesis.speak(ut);
            } catch (e) { if (onEndCallback) onEndCallback(); }
        };

        // --- NOVÉ ZVUKY - VYLEPŠENÉ ---
        const playKlaxon = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();
                osc.type = 'square';
                osc.frequency.setValueAtTime(180, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 1.0);
                filter.type = 'lowpass';
                filter.frequency.value = 800;
                gain.gain.setValueAtTime(0.8, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.8, ctx.currentTime + 0.9);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);
                osc.connect(filter).connect(gain).connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.05);
            } catch(e) {}
        };

        const playCelebration = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                // fanfára - hlasnejšia a slávnostnejšia
                const notes = [
                    {f: 523, t:0, d:0.25}, {f:659, t:0.25, d:0.25}, {f:784, t:0.5, d:0.3},
                    {f:1046, t:0.85, d:0.4}, {f:1318, t:1.3, d:0.6}, {f:1046, t:1.95, d:0.5}
                ];
                notes.forEach(n => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.type = 'sawtooth';
                    o.frequency.value = n.f;
                    g.gain.setValueAtTime(0, ctx.currentTime + n.t);
                    g.gain.linearRampToValueAtTime(0.9, ctx.currentTime + n.t + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.t + n.d);
                    o.connect(g).connect(ctx.destination);
                    o.start(ctx.currentTime + n.t);
                    o.stop(ctx.currentTime + n.t + n.d + 0.05);
                });
                // pridaný druhý hlas pre plnosť
                notes.forEach(n => {
                    const o2 = ctx.createOscillator();
                    const g2 = ctx.createGain();
                    o2.type = 'square';
                    o2.frequency.value = n.f * 0.5;
                    g2.gain.setValueAtTime(0, ctx.currentTime + n.t);
                    g2.gain.linearRampToValueAtTime(0.4, ctx.currentTime + n.t + 0.02);
                    g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + n.t + n.d);
                    o2.connect(g2).connect(ctx.destination);
                    o2.start(ctx.currentTime + n.t);
                    o2.stop(ctx.currentTime + n.t + n.d + 0.05);
                });
            } catch(e) {}
        };

        const getAllLocalProfiles = () => { try { return JSON.parse(localStorage.getItem('poke_edu_profiles')) || {}; } catch (e) { return {}; } };
        
        function saveProgress(specificName = null) {
            const userName = specificName || currentUserName;
            if (!userName) return;
            const profiles = getAllLocalProfiles();
            const now = Date.now();
            profiles[userName] = { unlockedIds, parental, stats, lastUpdate: now };
            localStorage.setItem('poke_edu_profiles', JSON.stringify(profiles));
            updateAllProfilesList();
            // TICHÁ SYNCHRONIZÁCIA - debounce 2s
            if (window.cloudSyncTimer) clearTimeout(window.cloudSyncTimer);
            window.cloudSyncTimer = setTimeout(() => {
                if (navigator.onLine && window.cloudDB && userName) {
                    try {
                        if(window.updateSyncStatus) window.updateSyncStatus('saving'); alert('Ukladám do cloudu...');
                        window.cloudDB.setDoc(
                            window.cloudDB.doc(window.cloudDB.db, "users", userName),
                            { unlockedIds, stats, parental, version: APP_VERSION, updatedAt: now },
                            { merge: true }
                        ).then(()=>{ if(window.updateSyncStatus) window.updateSyncStatus('synced'); }).catch(e=>{ console.log('Cloud save chyba', e); if(window.updateSyncStatus) window.updateSyncStatus('error'); });
                    } catch(e) { console.log('Cloud save chyba', e); if(window.updateSyncStatus) window.updateSyncStatus('error'); }
                }
            }, 2000);
        }

        function updateAllProfilesList() { 
            const profiles = getAllLocalProfiles();
            allProfiles = Object.keys(profiles).map(name => ({ id: name, ...profiles[name] })); 
        }

        async function loadUserData(userName) {
    const profiles = getAllLocalProfiles();
    let localData = profiles[userName] || null;

    // 1. OKAMŽITÉ LOKÁLNE NAČÍTANIE
    if (localData) {
        unlockedIds = localData.unlockedIds || [];
        parental = { ...globalParental, ...(localData.parental || {}) };
        stats = { unlockedToday: 0, lastDate: new Date().toLocaleDateString(), completedWords: [], taskCounter: 0, errorsToday: 0, mathAQueue: [], mathBQueue: [], ...(localData.stats || {}) };
        const today = new Date().toLocaleDateString();
        if (stats.lastDate !== today) { stats.unlockedToday = 0; stats.errorsToday = 0; stats.lastDate = today; }
    } else {
        unlockedIds = [];
        parental = { ...globalParental };
        stats = { unlockedToday: 0, lastDate: new Date().toLocaleDateString(), completedWords: [], taskCounter: 0, errorsToday: 0, mathAQueue: [], mathBQueue: [] };
    }
    applyVisualTheme();

    // 2. TICHÁ SYNCHRONIZÁCIA NA POZADÍ
    if (navigator.onLine && window.cloudDB) {
        try {
            const snap = await window.cloudDB.getDoc(window.cloudDB.doc(window.cloudDB.db, "users", userName));
            if (snap.exists()) {
                const cloud = snap.data();
                const cloudTime = cloud.updatedAt || 0;
                const localTime = localData?.lastUpdate || 0;
                
                if (!localData || cloudTime > localTime) {
                    // Cloud je novší - prepíš lokál
                    unlockedIds = cloud.unlockedIds || [];
                    parental = { ...globalParental, ...(cloud.parental || {}) };
                    stats = { unlockedToday: 0, lastDate: new Date().toLocaleDateString(), completedWords: [], taskCounter: 0, errorsToday: 0, mathAQueue: [], mathBQueue: [], ...(cloud.stats || {}) };
                    const today = new Date().toLocaleDateString();
                    if (stats.lastDate !== today) { stats.unlockedToday = 0; stats.errorsToday = 0; stats.lastDate = today; }
                    
                    const profiles2 = getAllLocalProfiles();
                    profiles2[userName] = { unlockedIds, parental, stats, lastUpdate: cloudTime };
                    localStorage.setItem('poke_edu_profiles', JSON.stringify(profiles2));
                    updateAllProfilesList();
                    
                    if(window.updateSyncStatus) window.updateSyncStatus('synced');
                    if (currentUserName === userName && activeScreen === 'game') render();
                }
            }
        } catch(e) { console.log('Cloud load chyba', e); }
    }
}

        window.nextTask = () => {
            if ((stats.unlockedToday + (stats.errorsToday||0)) >= parental.dailyLimit) { currentTask = { limitReached: true }; render(); return; }
            if (stats.taskCounter % 5 === 4) {
                generateMathTask();
            } else {
                generateWordTask();
            }
        };

        function generateMathTask() {
            const shuffle = arr => { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]] } return arr };
            if (!stats.mathAQueue || stats.mathAQueue.length===0) stats.mathAQueue = shuffle([3,4,5,6,7,8,9]);
            if (!stats.mathBQueue || stats.mathBQueue.length===0) stats.mathBQueue = shuffle([3,4,5,6,7,8,9]);
            const a = stats.mathAQueue.pop();
            const b = stats.mathBQueue.pop();
            const correct = a * b;
            let choices = new Set([correct]);
            while(choices.size < 4) {
                let offset = Math.floor(Math.random() * 11) - 5; 
                let val = correct + offset;
                if (val > 0 && val < 101) choices.add(val);
            }
            currentTask = {
                type: 'math',
                question: `${a} × ${b} = ?`,
                description: 'Zopakuj si aj toto!',
                correctAnswer: correct,
                choices: Array.from(choices).sort((x, y) => x - y),
                errorMadeInThisTask: false
            };
            render();
        }

        function generateWordTask() {
            let available = WORDS_DATABASE.filter(w => !stats.completedWords.includes(w.word));
            if (available.length === 0) { stats.completedWords = []; available = WORDS_DATABASE; }
            let pool = available.filter(w => w.word !== lastWordUsed);
            if (pool.length === 0) pool = available;
            let randomWordObj = pool[Math.floor(Math.random() * pool.length)];
            if (!randomWordObj) return;
            lastWordUsed = randomWordObj.word;
            const displayArray = randomWordObj.word.split('');
            const targets = [];
            displayArray.forEach((char, i) => { 
                if (['i', 'í', 'y', 'ý'].includes(char.toLowerCase())) { 
                    targets.push({ index: i, char: char.toLowerCase() }); 
                    displayArray[i] = '_'; 
                } 
            });
            currentTask = { ...randomWordObj, type: 'word', targets, currentTargetIndex: 0, displayArray, errorMadeInThisTask: false };
            render();
        }

        window.checkAnswer = (choice) => {
            if (!currentTask) return;
            if (currentTask.type === 'math') {
                if (choice === currentTask.correctAnswer) { handleSuccess(); }
                else {
                    currentTask.errorMadeInThisTask = true;
                    document.getElementById(`btn-math-${choice}`)?.classList.add('bg-red-500', 'text-white');
                    playKlaxon();
                    stats.errorsToday = (stats.errorsToday||0)+1; saveProgress();
                    setTimeout(() => speak("Chyba! Stratil si jeden kredit. Lepšie sa sústreď na odpovede", "sk-SK"), 1100);
                }
            } else {
                const target = currentTask.targets[currentTask.currentTargetIndex];
                if (choice === target.char) {
                    currentTask.displayArray[target.index] = choice;
                    currentTask.currentTargetIndex++;
                    if (currentTask.currentTargetIndex === currentTask.targets.length) {
                        if (!currentTask.errorMadeInThisTask && !stats.completedWords.includes(currentTask.word)) stats.completedWords.push(currentTask.word);
                        handleSuccess();
                    } else render();
                } else {
                    currentTask.errorMadeInThisTask = true; 
                    const btnId = choice==='í'?'i2':choice==='ý'?'y2':choice;
                    document.getElementById(`btn-${btnId}`)?.classList.add('bg-red-500', 'text-white');
                    playKlaxon();
                    stats.errorsToday = (stats.errorsToday||0)+1; saveProgress();
                    setTimeout(() => speak("Chyba! Stratil si jeden kredit. Lepšie sa sústreď na odpovede", "sk-SK"), 1100);
                    setTimeout(render, 500);
                }
            }
        };

        function handleSuccess() {
            stats.taskCounter++;
            const curGen = getCurrentLevelGen();
            const targetPokemon = POKEMON_DATA.find(p => p.gen == curGen && !unlockedIds.includes(p.id)) || POKEMON_DATA.find(p => !unlockedIds.includes(p.id));
            if (targetPokemon) { 
                unlockedIds.push(targetPokemon.id); 
                stats.unlockedToday++;
                // --- KONTROLA DOKONČENIA GENERÁCIE ---
                const genCount = POKEMON_DATA.filter(p => p.gen === targetPokemon.gen && unlockedIds.includes(p.id)).length;
                if (genCount === GEN_TOTALS[targetPokemon.gen]) {
                    // 1) fanfára - hlasnejšia
                    playCelebration();
                    // 2) zobraz ohňostroj
                    const modal = document.getElementById('modal'); modal.classList.remove('hidden');
                    modal.innerHTML = `<div class="bg-slate-900 p-10 rounded-[3rem] max-w-lg w-[95%] text-center shadow-2xl border-4 border-yellow-400 relative animate-fade overflow-hidden">
                        <div id="fireworks" style="position:absolute;inset:0;pointer-events:none;"></div>
                        <div class="relative z-10">
                            <div style="font-size:4rem;margin-bottom:1rem;">🎆</div>
                            <h2 class="text-2xl font-black text-yellow-300 uppercase mb-4 tracking-tighter">Generácia ${targetPokemon.gen}</h2>
                            <p class="text-white/80 text-sm">Priprav sa na oslavu...</p>
                        </div>
                    </div>`;
                    // jednoduchá animácia ohňostroja
                    const fw = document.getElementById('fireworks');
                    for(let i=0;i<30;i++){ const s=document.createElement('div'); s.textContent='✨'; s.style.position='absolute'; s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%'; s.style.fontSize=(12+Math.random()*24)+'px'; s.style.animation=`fw${i%3} ${2+Math.random()*2}s infinite`; fw.appendChild(s); }
                    const style=document.createElement('style'); style.textContent='@keyframes fw0{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.5)}100%{opacity:0}}@keyframes fw1{0%{opacity:0;transform:translateY(20px)}50%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}@keyframes fw2{0%{opacity:0;transform:rotate(0)}100%{opacity:1;transform:rotate(360deg)}}'; document.head.appendChild(style);
                    // 3) po fanfárach prehovor
                    setTimeout(() => {
                        const praise = PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)];
                        speak(`${praise}! ${currentUserName}, vyslobodil si všetkých pokémonov z generácie ${GEN_NAMES[targetPokemon.gen]}!`, "sk-SK", () => {
                            // 4) zobraz finálne okno
                            modal.innerHTML = `<div class="bg-white dark:bg-slate-800 p-10 rounded-[3rem] max-w-md w-[95%] text-center shadow-2xl border-4 border-yellow-400 animate-fade">
                                <div style="font-size:4rem;margin-bottom:1rem;">🏆</div>
                                <h2 class="text-2xl font-black text-blue-900 dark:text-yellow-300 uppercase mb-2 tracking-tighter">Generácia ${targetPokemon.gen} je vyslobodená!</h2>
                                <p class="text-gray-600 dark:text-gray-300 mb-8">${GEN_NAMES[targetPokemon.gen]}</p>
                                <div class="space-y-3">
                                    <button onclick="document.getElementById('modal').classList.add('hidden'); switchScreen('gallery', ${targetPokemon.gen})" class="w-full bg-yellow-400 text-blue-900 py-4 rounded-2xl font-black uppercase shadow-lg">Prejsť do Galérie</button>
                                    <button onclick="confirmExit(true)" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Skončiť</button>
                                </div>
                            </div>`;
                        });
                    }, 2200);
                } else {
                    openDetailModal(targetPokemon, true);
                }
            }
            setTimeout(nextTask, 500);
        }

        function getCurrentLevelGen() { 
            const un = POKEMON_DATA.filter(p => unlockedIds.includes(p.id)); 
            if (un.length === 0) return 1;
            const max = Math.max(...un.map(p => p.gen), 1); 
            return POKEMON_DATA.filter(p => p.gen == max && !unlockedIds.includes(p.id)).length > 0 ? max : (max < 9 ? max + 1 : 9); 
        }

        window.handleLogin = (e, nameParam = null) => {
            if (e) e.preventDefault();
            speak(" "); setTimeout(() => speak("Aktivujem systém.", "sk-SK"), 50);
            let name = nameParam || document.getElementById('userName')?.value.trim();
            if (!name) return;
            const profiles = getAllLocalProfiles();
            // registrácia nového - kontrola duplikátu

        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .pokeball-loader { animation: spin 1.2s linear infinite; }
        @keyframes pulseSlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        .animate-pulse-slow { animation: pulseSlow 2s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

    <div id="app"></div>
    <div id="modal" class="fixed inset-0 bg-blue-900/90 dark:bg-slate-950/90 backdrop-blur-xl z-[100] flex items-center justify-center hidden p-4"></div>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js?v=' + APP_VERSION);});}</script>
</body>
